<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Satish Meena - Photo Gallery</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#111;
color:#fff;
text-align:center;
}

header{
background:#0d6efd;
padding:20px;
}

h1{
margin:0;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:15px;
padding:20px;
}

.gallery img{
width:100%;
height:220px;
object-fit:cover;
border-radius:12px;
}

footer{
background:#000;
padding:15px;
margin-top:20px;
}
</style>
</head>

<body>

<header>
<h1>📷 Satish Meena Gallery</h1>
<p>Welcome to my photo gallery</p>
</header>

<div class="gallery">
<img src="https://picsum.photos/300/400?1">
<img src="https://picsum.photos/300/400?2">
<img src="https://picsum.photos/300/400?3">
<img src="https://picsum.photos/300/400?4">
<img src="https://picsum.photos/300/400?5">
<img src="https://picsum.photos/300/400?6">
</div>

<footer>
© 2026 Satish Meena
</footer>

</body>
</html>
