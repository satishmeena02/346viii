<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>346VIII</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0d1117;
color:white;
text-align:center;
}

header{
padding:40px 20px;
background:linear-gradient(135deg,#0066ff,#7b2cff);
}

h1{
font-size:42px;
}

p{
margin-top:10px;
color:#ddd;
}

.btn{
display:inline-block;
margin-top:20px;
padding:12px 25px;
background:white;
color:#0066ff;
text-decoration:none;
border-radius:30px;
font-weight:bold;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
padding:25px;
}

.gallery img{
width:100%;
border-radius:12px;
transition:.3s;
}

.gallery img:hover{
transform:scale(1.05);
}

footer{
margin-top:30px;
padding:20px;
background:#000;
}
</style>

</head>
<body>

<header>
<h1>346VIII</h1>
<p>Official Website</p>
<a class="btn" href="#">Explore</a>
</header>

<section class="gallery">
<img src="https://picsum.photos/300/400?1">
<img src="https://picsum.photos/300/400?2">
<img src="https://picsum.photos/300/400?3">
<img src="https://picsum.photos/300/400?4">
<img src="https://picsum.photos/300/400?5">
<img src="https://picsum.photos/300/400?6">
</section>

<footer>
© 2026 346VIII • All Rights Reserved
</footer>

</body>
</html>
