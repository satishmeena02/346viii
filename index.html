<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satish Meena - Premium Instagram</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #000; color: #fff; padding-bottom: 70px; }
        
        /* Auth Screen (Login / Signup) */
        #authScreen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #000; padding: 20px; text-align: center; position: fixed; top: 0; left: 0; width: 100%; z-index: 2000; }
        .auth-box { width: 100%; max-width: 350px; border: 1px solid #262626; padding: 30px 20px; border-radius: 8px; background: #000; }
        .auth-box h1 { font-family: cursive; margin-bottom: 25px; font-size: 32px; color: #fff; }
        .auth-box input { width: 100%; padding: 12px; margin-bottom: 10px; background: #121212; border: 1px solid #333; color: #fff; border-radius: 5px; outline: none; box-sizing: border-box; }
        .auth-box button { width: 100%; padding: 10px; background: #0095f6; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 15px; }
        .auth-switch { margin-top: 15px; font-size: 14px; color: #aaa; cursor: pointer; }
        .auth-switch span { color: #0095f6; font-weight: bold; }

        /* Main App Header */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; position: sticky; top: 0; background-color: #000; z-index: 100; border-bottom: 1px solid #262626; }
        .header .logo h1 { margin: 0; font-size: 22px; font-weight: bold; }
        .header span.badge { font-size: 10px; color: #0095f6; font-weight: bold; letter-spacing: 1px; }
        .header .icons i { font-size: 22px; margin-left: 15px; cursor: pointer; }

        /* Stories */
        .stories { display: flex; padding: 15px 10px; gap: 15px; overflow-x: auto; border-bottom: 1px solid #262626; scrollbar-width: none; }
        .story { display: flex; flex-direction: column; align-items: center; gap: 5px; font-size: 12px; cursor: pointer; flex-shrink: 0; }
        .story img { width: 65px; height: 65px; border-radius: 50%; border: 3px solid transparent; background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888) border-box; -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0); mask-composite: exclude; padding: 2px; object-fit: cover; }

        /* Posts */
        .post { margin-bottom: 20px; border-bottom: 1px solid #262626; padding-bottom: 15px; }
        .post-header { display: flex; align-items: center; padding: 10px 15px; gap: 10px; }
        .post-header img { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; }
        .post-header span { font-weight: bold; font-size: 14px; }
        .follow-btn { margin-left: auto; background-color: #0095f6; color: white; border: none; border-radius: 6px; padding: 5px 14px; font-weight: bold; font-size: 13px; cursor: pointer; }
        .follow-btn.following { background-color: #262626; }

        .post-media { position: relative; width: 100%; max-height: 550px; background: #111; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .post-media img { width: 100%; max-height: 550px; object-fit: cover; }
        
        .big-heart { position: absolute; color: white; font-size: 80px; opacity: 0; transform: scale(0); transition: all 0.3s ease-out; pointer-events: none; }
        .big-heart.animate { opacity: 0.9; transform: scale(1.2); }

        .post-actions { padding: 10px 15px; display: flex; justify-content: space-between; font-size: 24px; }
        .post-actions .left i { margin-right: 15px; cursor: pointer; }
        .post-likes { padding: 0 15px; font-weight: bold; font-size: 14px; margin-bottom: 5px; }
        .post-caption { padding: 0 15px; font-size: 14px; margin-bottom: 8px; }
        .post-caption span { color: #0095f6; }

        /* Comments */
        .comments-section { padding: 0 15px; font-size: 13px; }
        .comment-item { margin-bottom: 3px; }
        .add-comment-box { display: flex; padding: 8px 15px; gap: 10px; margin-top: 8px; }
        .add-comment-box input { flex: 1; background: #121212; border: 1px solid #333; color: white; padding: 8px; border-radius: 6px; outline: none; font-size: 13px; }
        .add-comment-box button { background: none; border: none; color: #0095f6; font-weight: bold; cursor: pointer; }

        /* Modals */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 3000; align-items: center; justify-content: center; }
        .modal-content { background: #1c1c1c; padding: 20px; border-radius: 12px; width: 90%; max-width: 400px; display: flex; flex-direction: column; gap: 12px; }
        .modal-content h3 { margin: 0 0 10px 0; color: #fff; }
        .modal-content input { padding: 10px; background: #262626; border: 1px solid #444; color: #fff; border-radius: 6px; outline: none; }
        .modal-btns { display: flex; justify-content: flex-end; gap: 10px; margin-top: 10px; }
        .modal-btns button { padding: 8px 16px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-cancel { background: #333; color: #fff; }
        .btn-post { background: #0095f6; color: #fff; }

        /* Bottom Nav */
        .bottom-nav { display: flex; justify-content: space-around; align-items: center; padding: 12px 0; position: fixed; bottom: 0; width: 100%; background-color: #000; border-top: 1px solid #262626; font-size: 22px; z-index: 100; }
        .bottom-nav i { cursor: pointer; }
        .liked { color: #ff3040 !important; }
    </style>
</head>
<body>

    <!-- AUTH SCREEN (LOGIN / SIGNUP) -->
    <div id="authScreen">
        <div class="auth-box">
            <h1>Satish Meena</h1>
            <div id="formContainer">
                <!-- Login Form by default -->
                <input type="text" id="authUsername" placeholder="Username">
                <input type="password" id="authPassword" placeholder="Password">
                <button onclick="handleAuth()">Log In</button>
                <div class="auth-switch" onclick="switchMode()">Don't have an account? <span>Sign up</span></div>
            </div>
        </div>
    </div>

    <!-- MAIN APP SCREEN -->
    <div id="mainApp" style="display: none;">
        <!-- Header -->
        <div class="header">
            <div class="logo">
                <h1>Satish Meena</h1>
                <span class="badge">PREMIUM EDITION</span>
            </div>
            <div class="icons">
                <i class="fa-regular fa-square-plus" onclick="openPostModal()" title="Create Post"></i>
                <i class="fa-solid fa-right-from-bracket" onclick="logout()" title="Log Out"></i>
            </div>
        </div>

        <!-- Stories Container -->
        <div class="stories" id="storiesContainer"></div>

        <!-- Feed Container -->
        <div id="feedContainer"></div>
    </div>

    <!-- Create Post Modal -->
    <div class="modal" id="postModal">
        <div class="modal-content">
            <h3>Create New Post</h3>
            <input type="text" id="postImageInput" placeholder="Image URL (e.g. https://...)">
            <input type="text" id="postCaptionInput" placeholder="Write a caption...">
            <div class="modal-btns">
                <button class="btn-cancel" onclick="closePostModal()">Cancel</button>
                <button class="btn-post" onclick="addNewPost()">Post</button>
            </div>
        </div>
    </div>

    <script>
        let isSignupMode = false;
        let currentUser = localStorage.getItem('satish_current_user');

        // Check if user is already logged in
        if (currentUser) {
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
        }

        // Switch between Login and Signup form UI
        function switchMode() {
            isSignupMode = !isSignupMode;
            const container = document.getElementById('formContainer');
            if (isSignupMode) {
                container.innerHTML = `
                    <input type="text" id="authUsername" placeholder="Choose Username">
                    <input type="password" id="authPassword" placeholder="Create Password">
                    <button onclick="handleAuth()">Sign Up</button>
                    <div class="auth-switch" onclick="switchMode()">Have an account? <span>Log In</span></div>
                `;
            } else {
                container.innerHTML = `
                    <input type="text" id="authUsername" placeholder="Username">
                    <input type="password" id="authPassword" placeholder="Password">
                    <button onclick="handleAuth()">Log In</button>
                    <div class="auth-switch" onclick="switchMode()">Don't have an account? <span>Sign up</span></div>
                `;
            }
        }

        // Handle Login & Signup logic
        function handleAuth() {
            const username = document.getElementById('authUsername').value.trim();
            const password = document.getElementById('authPassword').value.trim();

            if(!username || !password) {
                alert("Please fill all fields!");
                return;
            }

            let users = JSON.parse(localStorage.getItem('satish_users')) || [];

            if (isSignupMode) {
                // Check if user already exists
                let existing = users.find(u => u.username === username);
                if(existing) {
                    alert("Username already exists! Try another.");
                    return;
                }
                users.push({ username, password });
                localStorage.setItem('satish_users', JSON.stringify(users));
                alert("Account created successfully! Please log in.");
                switchMode();
            } else {
                // Login check
                let validUser = users.find(u => u.username === username && u.password === password);
                // Allow default or newly signed up users
                if (validUser || (username === "satish" && password === "1234")) {
                    localStorage.setItem('satish_current_user', username);
                    document.getElementById('authScreen').style.display = 'none';
                    document.getElementById('mainApp').style.display = 'block';
                    renderApp();
                } else {
                    alert("Invalid Username or Password! (Hint: Sign up first)");
                }
            }
        }

        function logout() {
            localStorage.removeItem('satish_current_user');
            location.reload();
        }

        // App Data Storage
        let posts = JSON.parse(localStorage.getItem('satish_posts')) || [
            {
                username: "satish_meena_official",
                userPic: "https://picsum.photos/50/50?random=10",
                media: "https://picsum.photos/600/600?random=11",
                caption: "Welcome to my premium space! 🔥 #satishmeena #premium",
                likes: 1420,
                isLiked: false,
                comments: ["Awesome look!", "🔥 Bro rocking!"]
            }
        ];

        let stories = [
            { name: "Vkeel", pic: "https://picsum.photos/100/100?random=2" },
            { name: "Awani", pic: "https://picsum.photos/100/100?random=3" },
            { name: "Naitik", pic: "https://picsum.photos/100/100?random=4" },
            { name: "Hardik", pic: "https://picsum.photos/100/100?random=5" }
        ];

        function saveData() {
            localStorage.setItem('satish_posts', JSON.stringify(posts));
        }

        function renderApp() {
            // Render Stories
            let activeUser = localStorage.getItem('satish_current_user') || "You";
            let storiesHTML = `<div class="story"><img src="https://picsum.photos/100/100?random=1" alt="Add"><span>${activeUser}</span></div>`;
            stories.forEach(s => {
                storiesHTML += `<div class="story"><img src="${s.pic}" alt=""><span>${s.name}</span></div>`;
            });
            document.getElementById('storiesContainer').innerHTML = storiesHTML;

            // Render Posts
            let feedHTML = '';
            posts.forEach((post, index) => {
                let commentsHTML = '';
                post.comments.forEach(c => {
                    commentsHTML += `<div class="comment-item"><strong>user:</strong> ${c}</div>`;
                });

                feedHTML += `
                <div class="post">
                    <div class="post-header">
                        <img src="${post.userPic}" alt="">
                        <span>${post.username}</span>
                        <button class="follow-btn" onclick="toggleFollow(this)">Follow</button>
                    </div>
                    <div class="post-media" ondblclick="doubleTapLike(${index})">
                        <img src="${post.media}" alt="Post">
                        <i class="fa-solid fa-heart big-heart" id="heart-${index}"></i>
                    </div>
                    <div class="post-actions">
                        <div class="left">
                            <i class="${post.isLiked ? 'fa-solid fa-heart liked' : 'fa-regular fa-heart'}" onclick="toggleLike(${index})"></i>
                            <i class="fa-regular fa-comment"></i>
                            <i class="fa-regular fa-paper-plane"></i>
                        </div>
                        <div class="right"><i class="fa-regular fa-bookmark"></i></div>
                    </div>
                    <div class="post-likes">${post.likes} likes</div>
                    <div class="post-caption"><strong>${post.username}</strong> ${post.caption}</div>
                    <div class="comments-section" id="comments-${index}">${commentsHTML}</div>
                    <div class="add-comment-box">
                        <input type="text" id="comment-input-${index}" placeholder="Add a comment...">
                        <button onclick="addComment(${index})">Post</button>
                    </div>
                </div>`;
            });
            document.getElementById('feedContainer').innerHTML = feedHTML;
        }

        function toggleLike(index) {
            if (posts[index].isLiked) {
                posts[index].isLiked = false;
                posts[index].likes--;
            } else {
                posts[index].isLiked = true;
                posts[index].likes++;
            }
            saveData();
            renderApp();
        }

        function doubleTapLike(index) {
            if (!posts[index].isLiked) {
                posts[index].isLiked = true;
                posts[index].likes++;
            }
            saveData();
            renderApp();
            
            const heart = document.getElementById(`heart-${index}`);
            heart.classList.add('animate');
            setTimeout(() => { heart.classList.remove('animate'); }, 800);
        }

        function addComment(index) {
            const input = document.getElementById(`comment-input-${index}`);
            let activeUser = localStorage.getItem('satish_current_user') || "user";
            if (input.value.trim() !== "") {
                posts[index].comments.push(`${activeUser}: ${input.value}`);
                saveData();
                renderApp();
            }
        }

        function toggleFollow(btn) {
            if (btn.innerText === "Follow") {
                btn.innerText = "Following";
                btn.classList.add("following");
            } else {
                btn.innerText = "Follow";
                btn.classList.remove("following");
            }
        }

        function openPostModal() { document.getElementById('postModal').style.display = 'flex'; }
        function closePostModal() { document.getElementById('postModal').style.display = 'none'; }

        function addNewPost() {
            c;
            const caption = document.getElementById('postCaptionInput').value;
            let activeUser = localStorage.getItem('satish_current_user') || "satish_meena";
            if(img) {
                posts.unshift({
                    username: activeUser,
                    userPic: "https://picsum.photos/50/50?random=12",
                    media: img,
                    caption: caption || "New premium post ✨",
                    likes: 1,
                    isLiked: false,
                    comments: []
                });
                saveData();
                renderApp();
                closePostModal();
                document.getElementById('postImageInput').value = '';
                document.getElementById('postCaptionInput').value = '';
            }
        }

        // Run render if already logged in on load
        if(currentUser) {
            renderApp();
        }
    </script>
</body>
</html>
